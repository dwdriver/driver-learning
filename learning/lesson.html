<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>

<body>

  <header class="site-topbar">
    <div class="site-wrap">
      <a class="site-brand" href="../">David Driver</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="../">Home</a>
        <a href="./" class="current">Learning</a>
        <a href="../#projects">Projects</a>
        <a href="../contact/">Contact</a>
      </nav>
    </div>
  </header>

  <div class="lesson-overlay">
    <div class="lesson-window">

      <div class="lesson-titlebar">
        <div class="window-controls-left">
          <button id="nav-prev" type="button">←</button>
          <button id="nav-next" type="button">→</button>
        </div>

        <div class="lesson-title">
          <span id="lesson-title"></span>
          <div id="lesson-progress" class="lesson-progress"></div>
        </div>

        <div class="window-controls-right">
          <button id="close-lesson" type="button" aria-label="Return to lesson menu">Lesson menu: ✕</button>
        </div>
      </div>

      <div class="lesson-body">
        <div id="practice-panels-root"></div>

        <div class="lesson-next">
          <button id="next-step" type="button">Next →</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    function getParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        course: params.get('course'),
        lesson: params.get('lesson')
      };
    }

    let panels = [];
    let currentPanelIndex = 0;
    let currentLessonData = null;
    let currentCourseData = null;
    let currentLessonIndex = -1;
    let answeredSteps = {};
    let backPromptCount = 0;

    function normalizeAnswer(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/\s+/g, ' ');
    }

    function shuffleArray(items) {
      const copy = [...items];

      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }

      return copy;
    }

    function isMcqStep(index) {
      if (!currentLessonData || !currentLessonData.steps[index]) return false;
      return currentLessonData.steps[index].type === 'mcq';
    }

    function isFillStep(index) {
      if (!currentLessonData || !currentLessonData.steps[index]) return false;
      return currentLessonData.steps[index].type === 'fill';
    }

    function isFinalStep(index) {
      if (!currentLessonData || !currentLessonData.steps[index]) return false;
      return currentLessonData.steps[index].type === 'next';
    }

    function buildStepPanel(step, index) {
      const panel = document.createElement('div');
      panel.className = 'lesson-panel';
      panel.id = `panel-step-${index}`;

      if (step.type === 'teach') {
        panel.innerHTML = `
          <div class="question-card">
            <p class="lesson-text">${step.text}</p>
          </div>
        `;
      }

      if (step.type === 'mcq') {
        const optionsHtml = step.options.map((opt, i) => `
          <button class="option-button"
                  data-step="${index}"
                  data-option="${i}"
                  type="button">
            ${opt}
          </button>
        `).join('');

        panel.innerHTML = `
          <div class="question-card">
            <h3>${step.question}</h3>
            <div class="options">${optionsHtml}</div>
            <div class="feedback" id="feedback-${index}"></div>
          </div>
        `;
      }

      if (step.type === 'fill') {
        const beforeText = step.before || step.prompt || '';
        const afterText = step.after || '';

        panel.innerHTML = `
          <div class="question-card">
            <h3 class="fill-line">
              <span>${beforeText}</span>
              <input
                class="text-answer inline-answer"
                size="${(step.answers && step.answers[0]) ? step.answers[0].length + 1 : 12}"
                id="input-${index}"
                type="text"
                autocomplete="off"
                spellcheck="false"
              />
              <span>${afterText}</span>
            </h3>
            <button
              class="check-answer-button"
              data-step="${index}"
              type="button">
              Check Answer
            </button>
            <div class="feedback" id="feedback-${index}"></div>
          </div>
        `;
        setTimeout(() => {
          const input = document.getElementById(`input-${index}`);
          if (input) {
            input.addEventListener('keydown', (e) => {
              if (e.key === 'Enter') {
                const btn = document.querySelector(
                  `[data-step="${index}"].check-answer-button`
                );
                if (btn) btn.click();
              }
            });
          }
        });
      }

      if (step.type === 'next') {
        panel.innerHTML = `
          <div class="question-card">
            <h2>${step.title}</h2>
            <p>${step.text}</p>
          </div>
        `;
      }

      return panel;
    }

    function updateNextButton() {
      const nextBtn = document.getElementById('next-step');

      if (!currentLessonData || !currentLessonData.steps[currentPanelIndex]) return;

      const step = currentLessonData.steps[currentPanelIndex];

      if (step.type === 'mcq' || step.type === 'fill') {
        nextBtn.textContent = 'Next →';
        nextBtn.disabled = !answeredSteps[currentPanelIndex];
        return;
      }

      if (step.type === 'next') {
        const hasNextLesson = currentLessonIndex < currentCourseData.lessons.length - 1;
        nextBtn.textContent = hasNextLesson ? 'Next lesson →' : 'Go to review →';
        nextBtn.disabled = false;
        return;
      }

      nextBtn.textContent = 'Next →';
      nextBtn.disabled = false;
    }

    function showPanel(index) {
      if (!panels.length) return;

      panels.forEach(panel => panel.classList.remove('active'));
      panels[index].classList.add('active');
      currentPanelIndex = index;

      const progress = document.getElementById('lesson-progress');
      const total = currentLessonData.steps.length;
      progress.textContent = `Step ${index + 1} of ${total}`;

      updateNextButton();
    }

    function goNext() {
      if (!panels.length) return;

      if ((isMcqStep(currentPanelIndex) || isFillStep(currentPanelIndex)) && !answeredSteps[currentPanelIndex]) {
        return;
      }

      if (currentPanelIndex < panels.length - 1) {
        backPromptCount = 0;
        showPanel(currentPanelIndex + 1);
        return;
      }

      const { course } = getParams();
      const hasNextLesson = currentLessonIndex < currentCourseData.lessons.length - 1;

      if (hasNextLesson) {
        const nextLesson = currentCourseData.lessons[currentLessonIndex + 1];
        window.location.href = `./lesson.html?course=${course}&lesson=${nextLesson.id}`;
      } else {
        window.location.href = `./review/index.html?course=${course}`;
      }
    }

    function goPrev() {
      if (!panels.length) return;

      if ((isMcqStep(currentPanelIndex) || isFillStep(currentPanelIndex)) && !answeredSteps[currentPanelIndex]) {
        backPromptCount += 1;

        if (backPromptCount === 1) {
          alert("Wait! Don't go back yet - try guessing first. Guessing reinforces 'active recall', a key part of the spaced-repetition learning process.");
          return;
        }

        if (backPromptCount === 2) {
          alert("Are you sure? There's no penalty for guessing. You can turn this feature off, but guessing first improves learning");
          return;
        }
      }

      backPromptCount = 0;

      if (currentPanelIndex > 0) {
        showPanel(currentPanelIndex - 1);
      } else {
        history.back();
      }
    }

    async function loadLesson() {
      const { course, lesson } = getParams();

      const res = await fetch(`./data/${course}.json`);
      const courseData = await res.json();

      const originalLessonData = courseData.lessons.find(l => l.id === lesson);

      const lessonData = originalLessonData
        ? {
          ...originalLessonData,
          steps: originalLessonData.shuffleSteps
            ? (() => {
              const steps = [...originalLessonData.steps];
              const lastStep = steps[steps.length - 1];

              if (lastStep && lastStep.type === 'next') {
                const shuffled = shuffleArray(steps.slice(0, -1));
                return [...shuffled, lastStep];
              }

              return shuffleArray(steps);
            })()
            : [...originalLessonData.steps]
        }
        : null;

      const lessonIndex = courseData.lessons.findIndex(l => l.id === lesson);

      if (!lessonData) {
        document.getElementById('lesson-title').textContent = 'Lesson not found';
        return;
      }

      currentCourseData = courseData;
      currentLessonData = lessonData;
      currentLessonIndex = lessonIndex;
      answeredSteps = {};
      backPromptCount = 0;

      document.getElementById('lesson-title').textContent = lessonData.title;

      const practicePanelsRoot = document.getElementById('practice-panels-root');
      practicePanelsRoot.innerHTML = '';

      lessonData.steps.forEach((step, index) => {
        const panel = buildStepPanel(step, index);
        practicePanelsRoot.appendChild(panel);
      });

      panels = Array.from(
        document.querySelectorAll('#practice-panels-root .lesson-panel')
      );

      showPanel(0);

      practicePanelsRoot.onclick = (e) => {
        const optionBtn = e.target.closest('.option-button');
        if (optionBtn) {
          const stepIndex = Number(optionBtn.dataset.step);
          const chosen = Number(optionBtn.dataset.option);

          const step = currentLessonData.steps[stepIndex];
          const feedback = document.getElementById(`feedback-${stepIndex}`);

          if (!step || step.type !== 'mcq') return;

          if (chosen === step.answer) {
            feedback.innerHTML = `<p class="correct">Correct.</p><p>${step.explanation}</p>`;
          } else {
            feedback.innerHTML = `<p class="incorrect">Not quite.</p><p>${step.explanation}</p>`;
          }

          answeredSteps[stepIndex] = true;
          backPromptCount = 0;
          updateNextButton();
          return;
        }

        const fillBtn = e.target.closest('.check-answer-button');
        if (fillBtn) {
          const stepIndex = Number(fillBtn.dataset.step);
          const step = currentLessonData.steps[stepIndex];
          const input = document.getElementById(`input-${stepIndex}`);
          const feedback = document.getElementById(`feedback-${stepIndex}`);

          if (!step || step.type !== 'fill' || !input || !feedback) return;

          const guess = normalizeAnswer(input.value);
          const acceptedAnswers = Array.isArray(step.answers) ? step.answers : [];
          const isCorrect = acceptedAnswers.some(answer => normalizeAnswer(answer) === guess);

          if (isCorrect) {
            feedback.innerHTML = `<p class="correct">Correct.</p>`;
          } else {
            feedback.innerHTML = `<p class="incorrect">Not quite.</p><p>Answer: ${acceptedAnswers[0] || ''}</p>`;
          }

          answeredSteps[stepIndex] = true;
          backPromptCount = 0;
          updateNextButton();
        }
      };
    }

    document.getElementById('next-step').addEventListener('click', goNext);
    document.getElementById('nav-next').addEventListener('click', goNext);
    document.getElementById('nav-prev').addEventListener('click', goPrev);
    document.getElementById('close-lesson').addEventListener('click', () => {
      window.location.href = './';
    });

    loadLesson();
  </script>

</body>

</html>
